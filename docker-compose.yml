version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: diagnostic_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: diagnostic_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/prescripto?authSource=admin
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: diagnostic_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: diagnostic_admin
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  mongo_data: